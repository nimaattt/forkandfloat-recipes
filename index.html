<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-4Z60BVXLNH"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-4Z60BVXLNH');
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipes – Fork & Float</title>
<meta name="description" content="Recipes from Ava's kitchen — Fork & Float">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Jost:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#F7F3EE;--warm-white:#FDFAF6;--sand:#E8DDD0;--taupe:#C4B5A5;--deep:#3A2E26;--accent:#9C6B45;--text:#2E2620;--muted:#8A7A6E}
html{scroll-behavior:smooth}
body{font-family:'Jost',sans-serif;background:var(--warm-white);color:var(--text);font-weight:300;line-height:1.7}
nav{display:flex;align-items:center;justify-content:space-between;padding:22px 56px;background:var(--warm-white);border-bottom:1px solid var(--sand);position:sticky;top:0;z-index:100}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:400;letter-spacing:.06em;color:var(--deep);text-decoration:none}
.nav-link{font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .2s}
.nav-link:hover{color:var(--accent)}
.page-header{max-width:1100px;margin:0 auto;padding:72px 56px 48px;display:flex;align-items:flex-end;justify-content:space-between;gap:32px}
.header-eyebrow{font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);display:block;margin-bottom:14px}
.page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(3rem,6vw,5rem);font-weight:300;line-height:1.05;color:var(--deep)}
.page-title em{font-style:italic;color:var(--accent)}
.recipe-count{font-family:'Cormorant Garamond',serif;font-size:4rem;font-weight:300;color:var(--sand);line-height:1;display:block;text-align:right}
.recipe-count-label{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--taupe)}
.filter-bar{max-width:1100px;margin:0 auto;padding:0 56px 40px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--sand);margin-bottom:56px}
.filter-btn{padding:8px 18px;border:1px solid var(--sand);border-radius:100px;background:transparent;font-family:'Jost',sans-serif;font-size:.72rem;font-weight:400;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .2s}
.filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.filter-btn.active{background:var(--deep);border-color:var(--deep);color:var(--cream)}
.grid-wrap{max-width:1100px;margin:0 auto;padding:0 56px 96px}
.grid-heading{font-size:.63rem;letter-spacing:.22em;text-transform:uppercase;color:var(--taupe);margin-bottom:32px;display:flex;align-items:center;gap:16px}
.grid-heading::after{content:'';flex:1;height:1px;background:var(--sand)}
.recipes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:32px}
.recipe-card{cursor:pointer;transition:transform .25s ease;text-decoration:none;display:block}
.recipe-card:hover{transform:translateY(-4px)}
.card-image{aspect-ratio:4/3;border-radius:3px;overflow:hidden;margin-bottom:20px;position:relative;background:var(--sand)}
.card-image img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease}
.card-image-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem}
.recipe-card:hover .card-image img{transform:scale(1.06)}
.card-tag{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;display:block}
.card-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:400;line-height:1.2;color:var(--deep);margin-bottom:8px}
.card-desc{font-size:.83rem;color:var(--muted);line-height:1.75;margin-bottom:16px}
.card-meta{display:flex;gap:16px;align-items:center}
.card-meta-item{font-size:.7rem;color:var(--taupe);letter-spacing:.05em}
.dot{width:3px;height:3px;border-radius:50%;background:var(--sand);display:inline-block}
.new-badge{position:absolute;top:12px;right:12px;background:var(--accent);color:white;font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;padding:5px 10px;border-radius:100px}
.empty-state{text-align:center;padding:80px 40px;color:var(--muted)}
.empty-state h2{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;color:var(--deep);margin-bottom:12px}
.empty-state p{font-size:.9rem}
.email-strip{background:var(--deep);padding:64px 56px}
.email-strip-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:48px}
.strip-eyebrow{font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--taupe);margin-bottom:12px;display:block}
.strip-heading{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:300;color:var(--cream);line-height:1.2}
.strip-heading em{font-style:italic;color:var(--taupe)}
.strip-form{display:flex;gap:10px}
.strip-input{padding:13px 20px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:3px;color:var(--cream);font-family:'Jost',sans-serif;font-size:.85rem;font-weight:300;outline:none;width:260px;transition:border-color .2s}
.strip-input::placeholder{color:rgba(196,181,165,.45)}
.strip-input:focus{border-color:var(--accent)}
.strip-btn{padding:13px 22px;background:var(--accent);color:white;border:none;border-radius:3px;font-family:'Jost',sans-serif;font-size:.72rem;font-weight:400;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:background .2s}
.strip-btn:hover{background:#B07848}
.strip-note{font-size:.68rem;color:rgba(196,181,165,.45);margin-top:10px}
footer{border-top:1px solid var(--sand);padding:28px 56px}
.footer-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.footer-logo{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--taupe);letter-spacing:.06em}
.footer-links{display:flex;gap:28px}
.footer-links a{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--taupe);text-decoration:none;transition:color .2s}
.footer-links a:hover{color:var(--accent)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.recipe-card:nth-child(1){animation:fadeUp .5s .05s ease both}
.recipe-card:nth-child(2){animation:fadeUp .5s .12s ease both}
.recipe-card:nth-child(3){animation:fadeUp .5s .19s ease both}
.recipe-card:nth-child(4){animation:fadeUp .5s .26s ease both}
.recipe-card:nth-child(5){animation:fadeUp .5s .33s ease both}
.recipe-card:nth-child(6){animation:fadeUp .5s .4s ease both}
@media(max-width:900px){nav,.page-header,.filter-bar,.grid-wrap{padding-left:24px;padding-right:24px}.recipes-grid{grid-template-columns:1fr 1fr}.email-strip{padding:48px 24px}.email-strip-inner{flex-direction:column;align-items:flex-start;gap:28px}.strip-form{flex-direction:column}.strip-input{width:100%}footer{padding:24px}}
@media(max-width:600px){.page-header{flex-direction:column;align-items:flex-start}.recipes-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav>
  <a href="https://www.forkandfloat.com" class="nav-logo">Fork &amp; Float</a>
  <a href="https://www.forkandfloat.com" class="nav-link">← Back to site</a>
</nav>

<div class="page-header">
  <div>
    <span class="header-eyebrow">From Ava's Kitchen</span>
    <h1 class="page-title">The <em>Recipe</em><br>Collection</h1>
  </div>
  <div style="text-align:right;flex-shrink:0">
    <span class="recipe-count" id="recipeCount">—</span>
    <span class="recipe-count-label">Recipes &amp; counting</span>
  </div>
</div>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" onclick="setFilter(this,'all')">All</button>
  <button class="filter-btn" onclick="setFilter(this,'quick')">Quick &amp; Easy</button>
  <button class="filter-btn" onclick="setFilter(this,'persian')">Persian-Inspired</button>
  <button class="filter-btn" onclick="setFilter(this,'vegetarian')">Vegetarian</button>
  <button class="filter-btn" onclick="setFilter(this,'salads')">Salads</button>
  <button class="filter-btn" onclick="setFilter(this,'mains')">Mains</button>
  <button class="filter-btn" onclick="setFilter(this,'dessert')">Dessert</button>
</div>

<div class="grid-wrap">
  <p class="grid-heading">All Recipes</p>
  <div class="recipes-grid" id="recipesGrid">
    <!-- Recipes are injected here by generate-index.js -->
  </div>
</div>

<div class="email-strip">
  <div class="email-strip-inner">
    <div>
      <span class="strip-eyebrow">Never miss a recipe</span>
      <h2 class="strip-heading">New recipes, straight<br>to your <em>inbox</em></h2>
    </div>
    <div>
      <div class="strip-form" id="stripForm">
        <input type="email" class="strip-input" id="stripEmail" placeholder="your@email.com">
        <button class="strip-btn" onclick="stripSubmit()">Join the kitchen →</button>
      </div>
      <p class="strip-note" id="stripNote">No spam. Just good food. Unsubscribe any time.</p>
    </div>
  </div>
</div>

<footer>
  <div class="footer-inner">
    <span class="footer-logo">Fork &amp; Float</span>
    <div class="footer-links">
      <a href="https://www.forkandfloat.com">Main Site</a>
      <a href="https://www.instagram.com" target="_blank">Instagram</a>
    </div>
  </div>
</footer>

<script>
// Load recipe index from recipes.json (generated at build time)
fetch('/recipes.json')
  .then(r => r.json())
  .then(recipes => {
    window._recipes = recipes;
    renderCards(recipes);
    document.getElementById('recipeCount').textContent = String(recipes.length).padStart(2,'0');
  })
  .catch(() => {
    document.getElementById('recipesGrid').innerHTML = '<div class="empty-state"><h2>Recipes coming soon</h2><p>Ava is busy in the kitchen.</p></div>';
    document.getElementById('recipeCount').textContent = '00';
  });

function renderCards(recipes) {
  const grid = document.getElementById('recipesGrid');
  if (!recipes.length) {
    grid.innerHTML = '<div class="empty-state"><h2>Recipes coming soon</h2><p>Ava is busy in the kitchen.</p></div>';
    return;
  }
  grid.innerHTML = recipes.map((r, i) => `
    <a class="recipe-card" href="/recipes/${r.slug}.html">
      <div class="card-image">
        ${r.coverImage
          ? `<img src="${r.coverImage}" alt="${r.title}">`
          : `<div class="card-image-placeholder">${r.emoji || '🍽️'}</div>`}
        ${i === 0 ? '<span class="new-badge">New</span>' : ''}
      </div>
      <span class="card-tag">${r.category}</span>
      <h3 class="card-title">${r.title}</h3>
      <p class="card-desc">${r.description}</p>
      <div class="card-meta">
        <span class="card-meta-item">${r.prepTime}</span>
        <span class="dot"></span>
        <span class="card-meta-item">Serves ${r.servings}</span>
        <span class="dot"></span>
        <span class="card-meta-item">${r.difficulty || 'Easy'}</span>
      </div>
    </a>
  `).join('');
}

function setFilter(el, tag) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  if (!window._recipes) return;
  const filtered = tag === 'all'
    ? window._recipes
    : window._recipes.filter(r => r.tags && r.tags.includes(tag));
  renderCards(filtered);
  gtag('event', 'filter_recipes', { filter_tag: tag });
}

function stripSubmit() {
  const e = document.getElementById('stripEmail').value;
  if (!e || !e.includes('@')) { document.getElementById('stripEmail').style.borderColor='#c0392b'; return; }
  gtag('event', 'email_signup', { location: 'homepage_strip' });
  document.getElementById('stripForm').innerHTML = '<p style="font-family:\'Cormorant Garamond\',serif;font-size:1.3rem;font-weight:300;color:var(--cream)">✦ &nbsp;Welcome to the kitchen, ' + e.split('@')[0] + '</p>';
  document.getElementById('stripNote').style.display = 'none';
}
</script>
</body>
</html>
