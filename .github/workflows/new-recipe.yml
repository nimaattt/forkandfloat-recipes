name: Generate Recipe Page

on:
  repository_dispatch:
    types: [new-recipe]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Write payload to file
        env:
          PAYLOAD: ${{ toJSON(github.event.client_payload) }}
        run: echo "$PAYLOAD" > /tmp/raw_payload.json

      - name: Flatten and generate recipe page
        run: |
          node -e "
            const raw = JSON.parse(require('fs').readFileSync('/tmp/raw_payload.json','utf8'));
            const flat = Object.assign({}, raw.meta, raw.timing, raw.content);
            require('fs').writeFileSync('/tmp/payload.json', JSON.stringify(flat));
          "
          node generate-recipe.js "$(cat /tmp/payload.json)"

      - name: Commit and push
        run: |
          git config user.email "bot@forkandfloat.com"
          git config user.name "Fork & Float Bot"
          git add .
          git diff --staged --quiet || git commit -m "✨ New recipe: ${{ github.event.client_payload.meta.title }}"
          git push
